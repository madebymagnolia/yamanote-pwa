# Netlify build config. The build assembles the site into dist/ and pre-renders
# the 60 per-station OG shells (see build.js). dist/_redirects (generated by the
# build) carries the station rules + SPA catch-all, so the publish dir is dist.
[build]
  command = "node build.js"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://madebymagnolia.com https://www.madebymagnolia.com"